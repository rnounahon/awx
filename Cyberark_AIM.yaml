---
- name: test pulling a per-device password from Cyberark AIM
  hosts: '{{ target_host | default("localhost") }}'
  gather_facts: false
  vars:
    ca_base_url: "https://
  

  tasks:
    - name: credential retrieval basic
      cyberark.pas.cyberark_credential:
        api_base_url: "{{ ca_base_url }}"
        app_id: "testappid"
        query: "safe=AWX_SYS-A-FR-UNX-S-PRD;UserName=SVC-AWX-LIN;Object={{ inventory_hostname | upper }}"
        validate_certs: no
        fail_request_on_password_change: true
        connection_timeout: 60
      run_once: false
      register: ca_password

    - name: set ansible_password for each host
      set_fact:
        ansible_user: admin
        ansible_password: "{{ ca_password.result.content }}"
        ansible_connection: ssh
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        ansibble_ssh_common_args: '-o UserKnownHostsFile=/dev/null'
        ansible_ssh_common_args: '-o PasswordAuthentication=yes'
        ansible_ssh_common_args: '-o PreferedAuthentications=password'

    - name: set connection vars dynamically
      add_host:
        name: "{{ inventory_hostname }}"
        ansible_user: admin
        ansible_password: "{{ ca_password.result.content }}"
        ansible_ssh_common_args: '-o PasswordAuthentication=yes'
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  
    - name: show os version
      ansible.bultin.command: cat /etc/redhat-release


